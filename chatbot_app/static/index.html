<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VibeVoice Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 720px;
    height: 90vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.4rem;
    color: #a78bfa;
    letter-spacing: 1px;
  }
  #chat-box {
    flex: 1;
    overflow-y: auto;
    background: #1a1a24;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 0.95rem;
  }
  .msg.user {
    align-self: flex-end;
    background: #4f46e5;
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .msg.bot {
    align-self: flex-start;
    background: #2a2a38;
    color: #e8e8f0;
    border-bottom-left-radius: 3px;
  }
  .msg.bot .audio-wrap {
    margin-top: 8px;
  }
  .msg.bot audio {
    width: 100%;
    height: 36px;
  }
  .msg.thinking {
    align-self: flex-start;
    background: #2a2a38;
    color: #888;
    font-style: italic;
  }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #speaker-select {
    background: #1a1a24;
    color: #e8e8f0;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  #input-row {
    display: flex;
    gap: 8px;
    flex: 1;
  }
  #user-input {
    flex: 1;
    background: #1a1a24;
    color: #e8e8f0;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: #4f46e5; }
  #send-btn {
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  #send-btn:hover { background: #6366f1; }
  #send-btn:disabled { background: #333; cursor: not-allowed; }
  .status-bar {
    text-align: center;
    font-size: 0.8rem;
    color: #555;
    height: 18px;
  }
  .status-bar.error { color: #f87171; }
  .status-bar.ok { color: #34d399; }
</style>
</head>
<body>
<div class="container">
  <h1>🎙️ VibeVoice Chatbot</h1>

  <div id="chat-box">
    <div class="msg bot">Hi! Ask me anything and I'll reply with voice.</div>
  </div>

  <div class="status-bar" id="status"></div>

  <div class="controls">
    <select id="speaker-select">
      <option value="Carter">Carter</option>
    </select>
    <div id="input-row">
      <input id="user-input" type="text" placeholder="Type your message..." autocomplete="off" />
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
const chatBox = document.getElementById('chat-box');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const statusBar = document.getElementById('status');
const speakerSelect = document.getElementById('speaker-select');

// load available voices
fetch('/tts/voices')
  .then(r => r.json())
  .then(data => {
    if (data.voices && data.voices.length > 0) {
      speakerSelect.innerHTML = '';
      data.voices.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        if (v.toLowerCase().includes('carter')) opt.selected = true;
        speakerSelect.appendChild(opt);
      });
    }
  })
  .catch(() => {});

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}

function setStatus(msg, type = '') {
  statusBar.textContent = msg;
  statusBar.className = `status-bar ${type}`;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  sendBtn.disabled = true;
  addMsg(text, 'user');

  const thinking = addMsg('Thinking...', 'thinking');
  setStatus('Calling GPT-4o-mini...');

  try {
    const resp = await fetch('/chat/audio', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, speaker: speakerSelect.value }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail || 'Request failed');
    }

    const replyText = resp.headers.get('X-Reply-Text') || '(audio reply)';
    const audioBlob = await resp.blob();
    const audioUrl = URL.createObjectURL(audioBlob);

    thinking.remove();

    const botDiv = document.createElement('div');
    botDiv.className = 'msg bot';
    botDiv.innerHTML = `
      <div>${replyText}</div>
      <div class="audio-wrap">
        <audio controls autoplay src="${audioUrl}"></audio>
      </div>`;
    chatBox.appendChild(botDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
    setStatus('Done', 'ok');

  } catch (e) {
    thinking.remove();
    addMsg(`Error: ${e.message}`, 'bot');
    setStatus(e.message, 'error');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
